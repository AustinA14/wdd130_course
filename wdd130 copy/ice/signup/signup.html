<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            width: 400px;
            height: auto;
            margin: auto;
            border: 10px solid darkblue;
            border-radius: 25px;
            background-color: #fff;
            margin-top: 25px;
            overflow: hidden;
        }

        h3 {
            position: relative;
            padding: 20px;
            text-align: center;

        }

        #closeBtn {
            position: absolute;
            margin: 10px;
            z-index: 2;
        }

        #hero {
            width: 100%;
            height: 200px;
            z-index: -1;
            object-fit: cover;
            object-position: center top;
            margin-bottom: -90px;

        }

        .hero-msg {
            color: #fff;
            text-shadow: 2px 2px 5px #000;
            margin-bottom: 10px;
            text-align: center;
        }

        #books {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 3px;
            z-index: -1;
        }

        #myForm {
            align-items: center;
            padding: 10px 20px;
            margin-bottom: 10px;

        }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .form-row label {
            flex: 1;
        }

        .form-row input {
            flex: 1;
            width: 30px;
        }

        section {
            text-align: center;
            margin: 10px;
        }

        .scriptures {

            width: 100%;
            height: auto;
        }
    </style>




</head>

<body>
    <div id="formContainer">
        <button type="button" id="closeBtn">X</button>
        <img id="hero" src="images/jesus_feeds_5000.jpeg" alt="Jesus feeds the 5,000">
        <h1 class="hero-msg">Daily Feed</h1>
        <h2 class="hero-msg">Scripture a Day</h2>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <div class="form-row">    
                <label for="username">User Name:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-row">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-row">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-row">
                <label>Gender:</label>
                <div>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
        <div id="books">
            <img class="scriptures" src="images/old_testament.webp" alt="Old Testament">
            <img class="scriptures" src="images/new_testament.webp" alt="New Testament">
            <img class="scriptures" src="images/book_of_mormon.webp" alt="Book of Mormon">
            <img class="scriptures" src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants">
            <img class="scriptures" src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
